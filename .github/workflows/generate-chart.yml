name: Generate Chart

on:
  push:
    branches: [main]
    paths:
      - 'lora-params-matrix.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install numpy matplotlib

      - name: Generate chart
        env:
          MPLBACKEND: Agg
        run: python lora-params-matrix.py --png --svg

      - name: Commit chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lora_charts.png lora_charts.svg
          git diff --staged --quiet || git commit -m "chore: regenerate chart"
          git push
